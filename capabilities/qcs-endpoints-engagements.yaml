naftiko: 1.0.0-alpha2
info:
  label: Rigetti QCS — Endpoints and Engagements
  description: Self-contained Naftiko capability for Rigetti QCS Endpoints and Engagements — manage QPU endpoints
    and create short-lived engagements (access tokens) for QPU execution.
  tags:
  - Rigetti
  - QCS
  - Endpoints
  - Engagements
  - QPU Access
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    QCS_ACCESS_TOKEN: QCS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: qcs-endpoints-engagements
    baseUri: https://api.qcs.rigetti.com
    description: Rigetti QCS Endpoints + Engagements business capability. Self-contained.
    resources:
    - name: endpoints
      path: /v1/endpoints
      operations:
      - name: listendpoints
        method: GET
        description: List QPU endpoints.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          required: false
      - name: createendpoint
        method: POST
        description: Create a new QPU endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: endpoint
      path: /v1/endpoints/{endpointId}
      operations:
      - name: getendpoint
        method: GET
        description: Get endpoint details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
      - name: deleteendpoint
        method: DELETE
        description: Delete an endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
    - name: endpoint-restart
      path: /v1/endpoints/{endpointId}:restart
      operations:
      - name: restartendpoint
        method: POST
        description: Restart an endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: endpointId
          in: path
          type: string
          required: true
    - name: engagements
      path: /v1/engagements
      operations:
      - name: createengagement
        method: POST
        description: Create an engagement — a short-lived access credential scoped to a QPU endpoint, used by the
          gRPC Controller service to execute jobs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      value: '{{env.QCS_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: qcs-endpoints-engagements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rigetti QCS Endpoints + Engagements.
    tools:
    - name: rigetti-list-endpoints
      description: List QPU endpoints.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qcs-endpoints-engagements.listendpoints
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-get-endpoint
      description: Get a QPU endpoint.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qcs-endpoints-engagements.getendpoint
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-create-engagement
      description: Create a short-lived engagement (access credential) for executing on a QPU.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qcs-endpoints-engagements.createengagement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-restart-endpoint
      description: Restart an endpoint.
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: qcs-endpoints-engagements.restartendpoint
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Rigetti QCS — Reservations
  description: Self-contained Naftiko capability for Rigetti QCS Reservations — list, create, get, delete, and
    find-available reservation slots on a QPU.
  tags:
  - Rigetti
  - QCS
  - Reservations
  - QPU
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    QCS_ACCESS_TOKEN: QCS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: qcs-reservations
    baseUri: https://api.qcs.rigetti.com
    description: Rigetti QCS Reservations business capability. Self-contained, no shared references.
    resources:
    - name: reservations
      path: /v1/reservations
      operations:
      - name: listreservations
        method: GET
        description: List the caller's reservations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          required: false
        - name: order
          in: query
          type: string
          required: false
        - name: pageSize
          in: query
          type: integer
          required: false
        - name: pageToken
          in: query
          type: string
          required: false
      - name: createreservation
        method: POST
        description: Create a new reservation against an available QPU time slot.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: reservation
      path: /v1/reservations/{reservationId}
      operations:
      - name: getreservation
        method: GET
        description: Get a reservation by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reservationId
          in: path
          type: string
          required: true
      - name: deletereservation
        method: DELETE
        description: Cancel a reservation by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reservationId
          in: path
          type: string
          required: true
    - name: reservations-find-available
      path: /v1/reservations:findAvailable
      operations:
      - name: findavailablereservations
        method: GET
        description: Find available reservation slots on a quantum processor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: quantumProcessorId
          in: query
          type: string
          required: true
        - name: startTimeFrom
          in: query
          type: string
          required: false
        - name: duration
          in: query
          type: string
          required: false
    - name: group-reservations
      path: /v1/groups/{groupName}/reservations
      operations:
      - name: listgroupreservations
        method: GET
        description: List reservations for a QCS group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupName
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.QCS_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: qcs-reservations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rigetti QCS Reservations.
    tools:
    - name: rigetti-list-reservations
      description: List my reservations.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qcs-reservations.listreservations
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-create-reservation
      description: Create a QPU reservation.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: qcs-reservations.createreservation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-get-reservation
      description: Get reservation by ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qcs-reservations.getreservation
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-delete-reservation
      description: Cancel a reservation.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qcs-reservations.deletereservation
      outputParameters:
      - type: object
        mapping: $.
    - name: rigetti-find-available-reservations
      description: Find available QPU reservation slots.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qcs-reservations.findavailablereservations
      outputParameters:
      - type: object
        mapping: $.
